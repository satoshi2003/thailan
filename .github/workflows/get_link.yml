name: Get Adintrend M3U8 Link

on:
  workflow_dispatch: # Cho phép bạn bấm nút "Run workflow" thủ công trên Github
  schedule:
    - cron: '0 */6 * * *' # Chạy tự động mỗi 6 tiếng (tuỳ chỉnh theo múi giờ UTC)

jobs:
  fetch-m3u8:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper Script
        run: python script.py

      - name: Upload link as artifact (Tuỳ chọn)
        uses: actions/upload-artifact@v4
        with:
          name: m3u8-link
          path: stream_link.txt
          retention-days: 1
