name: Get Adintrend M3U8 Link

on:
  workflow_dispatch: # Cho phép chạy thủ công bằng nút bấm
  schedule:
    - cron: '0 */6 * * *' # Tự động chạy mỗi 6 tiếng

jobs:
  fetch-m3u8:
    runs-on: ubuntu-latest
    
    # QUAN TRỌNG: Cấp quyền ghi để Bot có thể tự push file vào Repo của bạn
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper Script
        run: python script.py

      - name: Commit and Push playlist.m3u8
        run: |
          # Cấu hình thông tin Bot GitHub
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Thêm file playlist.m3u8 vừa tạo vào danh sách commit
          git add playlist.m3u8
          
          # Kiểm tra nếu file có thay đổi mới thực hiện commit để tránh lỗi lặp bài
          git diff --quiet && git diff --staged --quiet || (git commit -m "Hệ thống tự động cập nhật playlist.m3u8" && git push)
